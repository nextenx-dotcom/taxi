{% extends 'base.html' %}
{% block title %}Вход — Taxi{% endblock %}
{% block extra_head %}
<style>
.auth-wrap { min-height: calc(100vh - 130px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
.auth-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; }
.auth-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 2px; color: var(--yellow); margin-bottom: 0.3rem; }
.auth-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
.divider { text-align: center; color: var(--muted); font-size: 0.8rem; margin: 1rem 0; position: relative; }
.divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 43%; height: 1px; background: var(--border); }
.divider::before { left: 0; } .divider::after { right: 0; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-box">
        <div class="auth-title">Вход</div>
        <p class="auth-sub">Войдите в аккаунт Taxi</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group"><label>Логин</label><input type="text" name="username" placeholder="Ваш логин" required autocomplete="username"></div>
            <div class="form-group"><label>Пароль</label><input type="password" name="password" placeholder="••••••••" required autocomplete="current-password"></div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.8rem">Войти →</button>
        </form>
        <div class="divider">или</div>
        <a href="{% url 'register_passenger' %}" class="btn btn-ghost" style="width:100%; justify-content:center">Регистрация пассажира</a>
        <div class="mt-1"><a href="{% url 'register_driver' %}" class="btn btn-ghost" style="width:100%; justify-content:center">Регистрация водителя</a></div>
    </div>
</div>
{% endblock %}
